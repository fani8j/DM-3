# configs/default.toml
seed = 42
reproducibility_mode = true
device = "cuda"          # auto-fallback to "cpu" with WARNING

[paths]
train_dir = "train/train"
test_dir = "test/test"
sample_submission = "sample_submission.csv"
experiments_dir = "experiments"
checkpoints_dir = "checkpoints"
submissions_dir = "submissions"

[preprocess]
nan_inf_to_zero = true
standardize = true
per_window_demean = false

[features]
magnitude = true
std_magnitude = true
first_difference = true
rolling_stats = true
rolling_window = 5
frequency_domain = true
freq_mode = "static"     # "broadcast" | "static"
[features.stretch]
gravity = false
gravity_cutoff_hz = 0.3
wrist_prior = false
wrist_prior_vector = []

[model]
arch = "tcn"             # "tcn" | "bigru" | "transformer"
hidden_dim = 128
depth = 6
kernel_size = 5          # tcn only
dropout = 0.2
nhead = 4                # transformer only

[train]
batch_size = 64
epochs = 60
optimizer = "adamw"      # "sgd" | "adam" | "adamw"
lr = 1e-3
weight_decay = 1e-4
lr_schedule = "cosine"   # "constant" | "step" | "cosine"
class_weighted_loss = true

[validation]
strategies = ["group_kfold", "random_split"]   # both run by default (R7.5)
[validation.group_kfold]
n_splits = 5
[validation.random_split]
train_fraction = 0.8
seed = 42

[predict]
ensemble_checkpoints = []  # empty → use best.pt of latest run
ensemble_weights = []      # empty → uniform
